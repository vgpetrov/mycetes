  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - db-mycetes-net

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"  # InfluxDB HTTP API
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - INFLUXDB_DB=stats
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=admin123
      - INFLUXDB_ADMIN_TOKEN=admintoken123
    networks:
      - monitor-mycetes-net

  telegraf:
    image: telegraf:1.30
    container_name: telegraf
    depends_on:
      - influxdb
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
    ports:
      - "8125:8125/udp"    # StatsD UDP listener
      - "8126:8126"        # StatsD admin (optional)
    networks:
      - monitor-mycetes-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3003"
    depends_on:
      - influxdb
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitor-mycetes-net

volumes:
  influxdb_data:
  grafana_data:
  pg_data:

networks:
  monitor-mycetes-net:
    driver: bridge
  db-mycetes-net:
    driver: bridge